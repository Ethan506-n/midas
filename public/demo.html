<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midas Proxy - Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1a;
    color: #e0e0ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #8892b0;
    margin-bottom: 2rem;
  }
  .card {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 700px;
    margin-bottom: 1rem;
    border: 1px solid #2a2a4e;
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: #a0a0ff;
  }
  .input-group {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid #3a3a5e;
    background: #0f0f1a;
    color: #e0e0ff;
    font-size: 1rem;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
  }
  button {
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    font-family: monospace;
    font-size: 0.85rem;
    padding: 0.75rem;
    background: #0f0f1a;
    border-radius: 8px;
    border: 1px solid #2a2a4e;
    min-height: 3rem;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .status.success { border-color: #4caf50; color: #a5d6a7; }
  .status.error { border-color: #f44336; color: #ef9a9a; }
  .features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .feature {
    background: #0f0f1a;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid #2a2a4e;
    font-size: 0.85rem;
  }
  .feature .label {
    color: #667eea;
    font-weight: 600;
    display: block;
    margin-bottom: 0.25rem;
  }
  .iframe-container {
    width: 100%;
    max-width: 900px;
    height: 500px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #2a2a4e;
    background: #0f0f1a;
    margin-top: 1rem;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

<h1>Midas Proxy</h1>
<p class="subtitle">Advanced detection-evading proxy engine</p>

<div class="card">
  <h2>Navigate</h2>
  <div class="input-group">
    <input type="text" id="urlInput" placeholder="https://example.com" value="https://example.com">
    <button id="goBtn" onclick="navigate()">Go</button>
  </div>
  <div class="status" id="navStatus">Ready</div>
</div>

<div class="card">
  <h2>System Status</h2>
  <div class="features">
    <div class="feature">
      <span class="label">Transport</span>
      <span id="transportStatus">Initializing...</span>
    </div>
    <div class="feature">
      <span class="label">Service Worker</span>
      <span id="swStatus">Checking...</span>
    </div>
    <div class="feature">
      <span class="label">Environment</span>
      <span id="envStatus">Checking...</span>
    </div>
    <div class="feature">
      <span class="label">Fingerprint</span>
      <span id="fpStatus">Checking...</span>
    </div>
  </div>
</div>

<div class="card">
  <h2>WebSocket Test</h2>
  <div class="input-group">
    <input type="text" id="wsUrl" placeholder="wss://echo.websocket.org/" value="wss://echo.websocket.org/">
    <button id="wsBtn" onclick="testWebSocket()">Connect</button>
  </div>
  <div class="status" id="wsStatus">Not connected</div>
</div>

<div class="iframe-container">
  <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script src="loader.js"></script>
<script>
  const navStatus = document.getElementById('navStatus');
  const wsStatus = document.getElementById('wsStatus');
  const transportStatus = document.getElementById('transportStatus');
  const swStatus = document.getElementById('swStatus');
  const envStatus = document.getElementById('envStatus');
  const fpStatus = document.getElementById('fpStatus');
  const proxyFrame = document.getElementById('proxyFrame');

  async function navigate() {
    const url = document.getElementById('urlInput').value;
    if (!url) return;
    navStatus.textContent = 'Loading ' + url + '...';
    navStatus.className = 'status';
    
    try {
      if (typeof midasFetch === 'function') {
        const resp = await midasFetch(url);
        const html = await resp.text();
        proxyFrame.srcdoc = html;
        navStatus.textContent = 'Loaded: ' + url + ' (status: ' + resp.status + ')';
        navStatus.className = 'status success';
      } else {
        // Fallback before midas is ready
        proxyFrame.src = '/_midas/browse?url=' + encodeURIComponent(url);
        navStatus.textContent = 'Fallback load: ' + url;
        navStatus.className = 'status success';
      }
    } catch (err) {
      navStatus.textContent = 'Error: ' + err.message;
      navStatus.className = 'status error';
    }
  }

  function testWebSocket() {
    const url = document.getElementById('wsUrl').value;
    wsStatus.textContent = 'Connecting to ' + url + '...';
    wsStatus.className = 'status';
    
    try {
      const ws = new WebSocket(url);
      ws.onopen = () => {
        wsStatus.textContent = 'Connected! Sending test message...';
        wsStatus.className = 'status success';
        ws.send('Hello from Midas!');
      };
      ws.onmessage = (e) => {
        wsStatus.textContent = 'Received: ' + e.data;
        ws.close();
      };
      ws.onerror = (e) => {
        wsStatus.textContent = 'WebSocket error occurred';
        wsStatus.className = 'status error';
      };
      ws.onclose = () => {
        if (!wsStatus.classList.contains('success') && !wsStatus.classList.contains('error')) {
          wsStatus.textContent = 'Connection closed';
        }
      };
    } catch (err) {
      wsStatus.textContent = 'Error: ' + err.message;
      wsStatus.className = 'status error';
    }
  }

  // Update status periodically
  setInterval(() => {
    if (typeof getTransport === 'function') {
      try {
        const t = getTransport();
        transportStatus.textContent = t.constructor.name.replace('Transport', '');
      } catch (e) {
        transportStatus.textContent = 'Not ready';
      }
    }
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(() => {
        swStatus.textContent = 'Active';
      }).catch(() => {
        swStatus.textContent = 'Inactive';
      });
    } else {
      swStatus.textContent = 'Unsupported';
    }
    
    if (typeof isEnvironmentSafe === 'function') {
      const status = isEnvironmentSafe();
      envStatus.textContent = status ? 'Safe' : 'Unsafe';
      envStatus.style.color = status ? '#4caf50' : '#f44336';
    }
    
    if (typeof getFingerprint === 'function') {
      const fp = getFingerprint();
      fpStatus.textContent = fp.canvasHash ? 'Randomized' : 'Native';
    }
  }, 2000);

  // Handle enter key
  document.getElementById('urlInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') navigate();
  });
</script>

</body>
</html>
