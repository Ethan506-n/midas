<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midas Proxy</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0d0f12;
    color: #e8e8e8;
  }
  .bar {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: #16191f;
    border-bottom: 1px solid #2a2f38;
    align-items: center;
    height: 50px;
  }
  .bar button {
    padding: 0 12px;
    height: 34px;
    min-width: 34px;
    border: 1px solid #2a2f38;
    background: #1d212a;
    color: #cdd2da;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .bar button:hover:not(:disabled) { background: #262b36; border-color: #3a4150; }
  .bar button:active:not(:disabled) { background: #1a1f28; }
  .bar button:disabled { opacity: .35; cursor: not-allowed; }
  .bar #go {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-color: transparent;
    color: white;
    font-weight: 600;
    padding: 0 16px;
  }
  .bar #go:hover { opacity: 0.9; }
  #u {
    flex: 1;
    height: 34px;
    padding: 0 12px;
    border: 1px solid #2a2f38;
    background: #0a0c10;
    color: #f0f0f0;
    border-radius: 6px;
    font: inherit;
    outline: none;
    min-width: 0;
  }
  #u:focus { border-color: #667eea; box-shadow: 0 0 0 2px #667eea33; }
  #status {
    font-size: 12px;
    color: #7a8290;
    padding: 0 6px;
    white-space: nowrap;
  }
  #frame {
    width: 100%;
    height: calc(100% - 50px);
    border: 0;
    background: #fff;
    display: block;
  }
  .loading #status::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid #667eea;
    border-top-color: transparent;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -2px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .engine { position: relative; }
  .engine select {
    height: 34px;
    background: #1d212a;
    color: #cdd2da;
    border: 1px solid #2a2f38;
    border-radius: 6px;
    padding: 0 8px;
    font: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="bar">
  <button id="back" title="Back (Alt+Left)" aria-label="Back">&lsaquo;</button>
  <button id="fwd" title="Forward (Alt+Right)" aria-label="Forward">&rsaquo;</button>
  <button id="reload" title="Reload (F5)" aria-label="Reload">&#x21bb;</button>
  <button id="home" title="Home" aria-label="Home">&#x2302;</button>
  <input id="u" type="text" placeholder="Search or enter URL" autofocus spellcheck="false" autocomplete="off">
  <span class="engine">
    <select id="engine" title="Search engine">
      <option value="ddg">DuckDuckGo</option>
      <option value="bing">Bing</option>
      <option value="brave">Brave</option>
      <option value="wiki">Wikipedia</option>
    </select>
  </span>
  <button id="go">Go</button>
  <span id="status"></span>
</div>
<iframe id="frame" name="midas-frame" src="about:blank" referrerpolicy="no-referrer"></iframe>

<script>
(() => {
  const ENGINES = {
    ddg:   q => 'https://duckduckgo.com/?q=' + encodeURIComponent(q) + '&kd=-1&kp=-2&kl=us-en',
    bing:  q => 'https://www.bing.com/search?q=' + encodeURIComponent(q),
    brave: q => 'https://search.brave.com/search?q=' + encodeURIComponent(q),
    wiki:  q => 'https://en.wikipedia.org/w/index.php?search=' + encodeURIComponent(q)
  };

  const $ = id => document.getElementById(id);
  const frame = $('frame');
  const ui = $('u');
  const status = $('status');
  const engine = $('engine');
  const backBtn = $('back'), fwdBtn = $('fwd'), reloadBtn = $('reload'), homeBtn = $('home'), goBtn = $('go');

  const stack = [];
  let cursor = -1;
  let suppressPush = false;
  let BROWSE = null;
  let lastPathsFetch = 0;

  async function fetchPaths() {
    const now = Date.now();
    if (BROWSE && now - lastPathsFetch < 5000) return;
    try {
      const r = await fetch('/_midas/session', { cache: 'no-store' });
      const data = await r.json();
      if (data && data.paths && data.paths.browse) {
        BROWSE = data.paths.browse;
        lastPathsFetch = now;
      }
    } catch (e) {
      if (!BROWSE) BROWSE = 'browse';
    }
  }

  function browsePath() {
    return '/_midas/' + BROWSE;
  }

  function looksLikeUrl(v) {
    if (/^https?:\/\//i.test(v)) return true;
    if (/\s/.test(v)) return false;
    if (/^localhost(:|\/|$)/i.test(v)) return true;
    if (/^[\w-]+(\.[\w-]+)+([:\/?#]|$)/.test(v)) return true;
    if (/^\d{1,3}(\.\d{1,3}){3}([:\/?#]|$)/.test(v)) return true;
    return false;
  }

  function smartUrl(input) {
    const v = input.trim();
    if (!v) return null;
    if (looksLikeUrl(v)) return /^https?:\/\//i.test(v) ? v : 'https://' + v;
    return ENGINES[engine.value](v);
  }

  function toProxy(target) {
    return browsePath() + '?url=' + encodeURIComponent(target);
  }

  function setLoading(b) {
    document.body.classList.toggle('loading', b);
    if (b) status.textContent = 'Loading...';
    else status.textContent = '';
  }

  function updateButtons() {
    backBtn.disabled = cursor <= 0;
    fwdBtn.disabled  = cursor >= stack.length - 1;
  }

  async function navigate(target, push) {
    await fetchPaths();
    const proxied = toProxy(target);
    if (push) {
      stack.splice(cursor + 1);
      stack.push(proxied);
      cursor = stack.length - 1;
    }
    suppressPush = !push;
    setLoading(true);
    frame.src = proxied;
    updateButtons();
  }

  async function go() {
    const t = smartUrl(ui.value);
    if (!t) return;
    await navigate(t, true);
  }

  goBtn.onclick = go;
  ui.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); go(); } });
  ui.addEventListener('focus', () => ui.select());

  backBtn.onclick   = () => { if (cursor > 0) { cursor--; navigate(stack[cursor], false); } };
  fwdBtn.onclick    = () => { if (cursor < stack.length - 1) { cursor++; navigate(stack[cursor], false); } };
  reloadBtn.onclick = () => { if (cursor >= 0) { suppressPush = true; setLoading(true); frame.src = stack[cursor]; } };
  homeBtn.onclick   = () => { stack.length = 0; cursor = -1; frame.src = 'about:blank'; ui.value = ''; ui.focus(); status.textContent = ''; updateButtons(); };

  document.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'ArrowLeft')  { e.preventDefault(); backBtn.click(); }
    if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); fwdBtn.click(); }
    if (e.key === 'F5' || ((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'r')) { e.preventDefault(); reloadBtn.click(); }
    if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'l') { e.preventDefault(); ui.focus(); }
  });

  frame.addEventListener('load', () => {
    setLoading(false);
    let src = frame.src || '';
    try {
      const inner = frame.contentWindow.location.href;
      if (inner && inner !== 'about:blank') src = inner;
    } catch {}

    const here = src.startsWith(location.origin) ? src.slice(location.origin.length) : src;
    if (here && here.startsWith('/_midas/') && here.includes('?url=') && !suppressPush) {
      if (stack[cursor] !== here) {
        stack.splice(cursor + 1);
        stack.push(here);
        cursor = stack.length - 1;
      }
    }
    suppressPush = false;
    updateButtons();
  });

  try { engine.value = localStorage.getItem('midas.engine') || 'ddg'; } catch {}
  engine.addEventListener('change', () => { try { localStorage.setItem('midas.engine', engine.value); } catch {} });

  fetchPaths();
  updateButtons();

  // Unregister any old service workers to prevent cached heavy sandbox
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      for (const reg of regs) reg.unregister();
    });
  }
})();
</script>
</body>
</html>
