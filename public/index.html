<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6f8;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }
    .status.ok { background: #dcfce7; color: #166534; display: block; }
    .status.err { background: #fee2e2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Enter URL</h1>
    <input type="text" id="url" placeholder="https://example.com" autocomplete="off">
    <button id="go">Go</button>
    <div id="status" class="status"></div>
  </div>

  <script src="/loader.js"></script>
  <script>
    document.getElementById('go').addEventListener('click', () => {
      const url = document.getElementById('url').value.trim();
      if (!url) return;
      window.location.href = '/?go=' + encodeURIComponent(url);
    });
  </script>
</body>
</html>
